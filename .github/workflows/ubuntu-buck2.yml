name: Ubuntu Buck2 Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: buck2 build (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install APT dependencies
        run: |
          # CI installs only the packages required for the smoke build. The
          # full ubuntuPackages.txt list contains developer tools (vim,
          # fastfetch, lldb, ...) that are unrelated to the build and not
          # always available on every Ubuntu release.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang lld curl ca-certificates git pkg-config \
            python3 python3-pip zstd

      - name: Install Buck2
        run: |
          ./scripts/installBuck2Ubuntu.sh
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Show buck2 version
        run: buck2 --version

      - name: Smoke build (small dependency-free target)
        run: |
          # Build a small target that transitively exercises lib:header and
          # the cxx toolchain. Expanding to //... is left to follow-up work
          # because individual targets require MKL/OpenGL/etc. system libs.
          buck2 build //advent/2020/1/...

      - name: Build ETFModeling with Buck2
        run: ./bETFModelingBuck2.sh

      - name: Build ETFModeling with Buck2 on Ubuntu 26.04
        run: |
          docker run --rm -v "${PWD}:/repo" -w /repo ubuntu:26.04 bash -lc '
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential clang lld curl ca-certificates git pkg-config \
              python3 python3-pip zstd
            ./scripts/installBuck2Ubuntu.sh
            ./bETFModelingBuck2.sh
          '
